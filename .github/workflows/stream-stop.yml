name: stream-stop

# 13:00 America/Mexico_City (UTC-6, no DST) = 19:00 UTC = start + 3h. Flip the site to REPLAY
# (latest archived match, looped) THEN stop the GPU box, so viewers roll straight onto the
# archive before the live feed goes down.
#
# SAFETY: scheduled runs ONLY fire from this repo's DEFAULT branch (main) — see stream-start.yml.
# Requires: secrets VAST_API_KEY, YT_API_KEY; vars VAST_INSTANCE_ID, YT_CHANNEL_ID.
#
# Stops BOTH boxes (primary + fallback): stream-start may have booted the fallback when the
# primary's GPU was taken, and stopping an already-stopped instance is a harmless no-op. A
# stop also cancels any still-queued start on that instance.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 19 * * *" # 19:00 UTC = 13:00 Mexico City

permissions:
  contents: write

concurrency:
  group: daily-stream
  cancel-in-progress: false

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TEMP GUARD — 2026-07-19 ONLY: the stream started late (17:19 UTC) so the normal
      # 19:00 UTC scheduled stop would cut it short; a manual dispatch at ~20:45 UTC does
      # the real stop today. Self-expiring (date check), but remove after today.
      - name: Skip today's early scheduled stop
        if: github.event_name == 'schedule'
        run: |
          if [ "$(date -u +%Y-%m-%d)" = "2026-07-19" ]; then
            echo "2026-07-19 exception: skipping scheduled stop (manual stop at ~20:45 UTC)"
            echo "SKIP_STOP=1" >> "$GITHUB_ENV"
          fi

      - name: Point the site at the latest archived match
        if: env.SKIP_STOP != '1'
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: |
          python3 scripts/update-state.py \
            --mode replay --channel "${{ vars.YT_CHANNEL_ID }}" --out state.json

      - name: Commit & push state.json
        if: env.SKIP_STOP != '1'
        run: |
          git config user.name  "stream-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: replay mode — latest archived match"
          git push

      - name: Stop BOTH Vast GPU boxes
        if: env.SKIP_STOP != '1'
        env:
          VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
          PRIMARY: ${{ vars.VAST_INSTANCE_ID }}
          FALLBACK: ${{ vars.VAST_FALLBACK_INSTANCE_ID || '44930041' }}
        run: |
          python3 -m pip install --quiet vastai
          rc=0
          vastai stop instance "$PRIMARY"  --api-key "$VAST_API_KEY" || rc=1
          vastai stop instance "$FALLBACK" --api-key "$VAST_API_KEY" || rc=1
          exit $rc
