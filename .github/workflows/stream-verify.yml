name: stream-verify

# Mid-window health check: ~1h after stream-start (with cron slip both land inside the
# 16:00–19:00 UTC window), ask the YouTube Data API whether the channel has a LIVE
# broadcast. If not, the daily stream is silently dead — box down, encoder pushing into a
# void, stream key unbound, or YouTube auto-start stuck — and this run goes RED so somebody
# actually finds out (green start runs hid exactly this failure on 2026-07-17/18).
#
# Requires: secret YT_API_KEY; var YT_CHANNEL_ID.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 17 * * *" # 17:30 UTC = 11:30 Mexico City, mid-window

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check the channel is LIVE
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YT_CHANNEL_ID: ${{ vars.YT_CHANNEL_ID }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request
          key, ch = os.environ["YT_API_KEY"], os.environ["YT_CHANNEL_ID"]
          url = ("https://www.googleapis.com/youtube/v3/search"
                 f"?part=id&channelId={ch}&eventType=live&type=video&key={key}")
          items = json.load(urllib.request.urlopen(url, timeout=30)).get("items", [])
          if not items:
              raise SystemExit(
                  "NO LIVE BROADCAST on the channel mid-window. The box may be up and the "
                  "encoder pushing, but YouTube shows nothing live — check the Vast box, "
                  "then YouTube Studio (stream key bound? auto-start on? stuck broadcast?).")
          print("LIVE:", items[0]["id"]["videoId"])
          EOF
