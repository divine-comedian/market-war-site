name: stream-start

# 10:00 America/Mexico_City (UTC-6, no DST) = 16:00 UTC. Start the GPU box (it auto-streams
# via pm2 on boot) and flip the site to LIVE.
#
# SAFETY: scheduled runs ONLY fire from this repo's DEFAULT branch (main). While this lives
# on a feature branch nothing runs on a schedule — merge to main to activate. You can also
# run it by hand any time via "Run workflow" (workflow_dispatch).
#
# Requires: secret VAST_API_KEY; vars VAST_INSTANCE_ID, YT_CHANNEL_ID (repo Settings →
# Secrets and variables → Actions). Vercel deploys this repo's main, so the state.json commit
# below triggers a redeploy.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 16 * * *" # 16:00 UTC = 10:00 Mexico City

permissions:
  contents: write

concurrency:
  group: daily-stream # start and stop never overlap
  cancel-in-progress: false

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start the Vast GPU box
        run: |
          python3 -m pip install --quiet vastai
          vastai start instance "${{ vars.VAST_INSTANCE_ID }}" --api-key "${{ secrets.VAST_API_KEY }}"

      - name: Point the site at the LIVE stream
        run: |
          python3 scripts/update-state.py \
            --mode live --channel "${{ vars.YT_CHANNEL_ID }}" --out state.json

      - name: Commit & push state.json
        run: |
          git config user.name  "stream-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: live mode — daily stream start"
          git push
